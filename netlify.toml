[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep the Divine Blueprint subdomain visible while serving its dedicated
# landing experience from the main Gleaning Ground deployment.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/"
  to = "/divine-blueprint/"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
