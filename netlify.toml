[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"
  POSTHOG_PROJECT_TOKEN = "phc_tdHrDUPYPtpqecRUdetv4epsUFDxzxvZxi8HAzjbwngk"
  POSTHOG_HOST = "https://us.i.posthog.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Send legacy Divine Blueprint pages on the main domain to the standalone site.
[[redirects]]
  from = "https://gleaningground.com/divine-blueprint/"
  to = "https://divineblueprint.gleaningground.com/"
  status = 301
  force = true

[[redirects]]
  from = "https://gleaningground.com/divine-blueprint/*"
  to = "https://divineblueprint.gleaningground.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://gleaningground.com/books/the-divine-blueprint/*"
  to = "https://divineblueprint.gleaningground.com/"
  status = 301
  force = true

# Serve the complete standalone Divine Blueprint website from its subdomain.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/"
  to = "/divine-blueprint-site/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/*"
  to = "/divine-blueprint-site/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
