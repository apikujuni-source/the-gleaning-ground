[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Send legacy Divine Blueprint pages on the main domain to the standalone site.
[[redirects]]
  from = "https://gleaningground.com/divine-blueprint/"
  to = "https://divineblueprint.gleaningground.com/"
  status = 301
  force = true

[[redirects]]
  from = "https://gleaningground.com/divine-blueprint/*"
  to = "https://divineblueprint.gleaningground.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://gleaningground.com/books/the-divine-blueprint/*"
  to = "https://divineblueprint.gleaningground.com/"
  status = 301
  force = true

# Never expose the internal publish folder in a public Divine Blueprint URL.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/divine-blueprint-site"
  to = "https://divineblueprint.gleaningground.com/"
  status = 301
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/divine-blueprint-site/*"
  to = "https://divineblueprint.gleaningground.com/:splat"
  status = 301
  force = true

# Redirect legacy HTML filenames to clean public routes.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/journey.html"
  to = "https://divineblueprint.gleaningground.com/journey"
  status = 301
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/bible-studies.html"
  to = "https://divineblueprint.gleaningground.com/bible-studies"
  status = 301
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/teachings.html"
  to = "https://divineblueprint.gleaningground.com/teachings"
  status = 301
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/companion.html"
  to = "https://divineblueprint.gleaningground.com/companion"
  status = 301
  force = true

# Serve the standalone Divine Blueprint website from its subdomain.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/"
  to = "/divine-blueprint-site/index.html"
  status = 200
  force = true

# Explicit navigation routes use real directory indexes generated during build.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/journey"
  to = "/divine-blueprint-site/journey/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/journey/"
  to = "/divine-blueprint-site/journey/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/bible-studies"
  to = "/divine-blueprint-site/bible-studies/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/bible-studies/"
  to = "/divine-blueprint-site/bible-studies/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/teachings"
  to = "/divine-blueprint-site/teachings/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/teachings/"
  to = "/divine-blueprint-site/teachings/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/companion"
  to = "/divine-blueprint-site/companion/index.html"
  status = 200
  force = true

[[redirects]]
  from = "https://divineblueprint.gleaningground.com/companion/"
  to = "/divine-blueprint-site/companion/index.html"
  status = 200
  force = true

# Remaining clean routes map into the standalone site. The build creates
# directory index pages for all top-level Divine Blueprint HTML pages.
[[redirects]]
  from = "https://divineblueprint.gleaningground.com/*"
  to = "/divine-blueprint-site/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
