backend:
  name: github
  repo: apikujuni-source/the-gleaning-ground
  branch: main

site_url: https://gleaningground.com
display_url: https://gleaningground.com
logo_url: https://gleaningground.com/assets/mark.svg

media_folder: content/uploads
public_folder: /assets/uploads
publish_mode: editorial_workflow
local_backend: true

collections:
  - name: divine_blueprint
    label: The Divine Blueprint
    files:
      - label: Homepage Settings
        name: homepage
        file: content/divine-blueprint.json
        format: json
        fields:
          - label: Homepage Book Cover
            name: homepageBookCover
            widget: image
            hint: "Upload a PNG, JPG, or WebP mockup. Publishing updates the homepage and automatically creates a cache-safe image URL."
          - label: Book Cover Alt Text
            name: homepageBookCoverAlt
            widget: string
            hint: "Briefly describe the cover for visitors using screen readers."
  - name: global_areas
    label: Global Navigation & Footer
    label_singular: Global Area
    folder: content/page-settings/global
    create: false
    extension: json
    format: json
    identifier_field: adminTitle
    description: "Edit the navigation and footer shared by every page on each website."
    fields:
      - {label: Area, name: adminTitle, widget: string}
      - {label: Website, name: target, widget: hidden}
      - {label: Page Path, name: pagePath, widget: hidden}
      - label: Sections
        name: sections
        widget: list
        allow_add: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.label}}"
        fields:
          - {label: Section Name, name: label, widget: hidden}
          - label: Text
            name: textFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Formatting Mode, name: mode, widget: hidden}
              - {label: Content, name: value, widget: text, hint: "Edit the words here. Preserve any visible HTML tags in specially formatted headings."}
          - label: Links & Buttons
            name: linkFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Editable Text, name: textEditable, widget: hidden, default: true}
              - {label: Link Text, name: text, widget: string, required: false, condition: {field: textEditable, value: true}}
              - {label: Destination URL, name: url, widget: string}
          - label: Images
            name: imageFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Image, name: src, widget: image}
              - {label: Alternative Text, name: alt, widget: string, required: false}
          - label: Form Fields
            name: attributeFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Attribute, name: attribute, widget: hidden}
              - {label: Content, name: value, widget: string}
  - name: main_pages
    label: Gleaning Ground Pages
    label_singular: Gleaning Ground Page
    folder: content/page-settings/main
    create: false
    extension: json
    format: json
    identifier_field: adminTitle
    description: "Edit every static section on gleaningground.com. Devotional, teaching, book, and resource cards remain connected to their dedicated collections."
    fields:
      - {label: Page, name: adminTitle, widget: string}
      - {label: Website, name: target, widget: hidden}
      - {label: Page Path, name: pagePath, widget: hidden}
      - label: Search & Sharing
        name: seo
        widget: object
        collapsed: true
        fields:
          - {label: Browser & Search Title, name: title, widget: string}
          - {label: Search Description, name: description, widget: text, required: false}
      - label: Page Sections
        name: sections
        widget: list
        allow_add: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.label}}"
        fields:
          - {label: Section Name, name: label, widget: hidden}
          - label: Headings & Paragraphs
            name: textFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Formatting Mode, name: mode, widget: hidden}
              - {label: Content, name: value, widget: text, hint: "Edit the words here. Preserve any visible HTML tags in specially formatted headings."}
          - label: Links & Buttons
            name: linkFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Editable Text, name: textEditable, widget: hidden, default: true}
              - {label: Link Text, name: text, widget: string, required: false, condition: {field: textEditable, value: true}}
              - {label: Destination URL, name: url, widget: string}
          - label: Images
            name: imageFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Image, name: src, widget: image}
              - {label: Alternative Text, name: alt, widget: string, required: false}
          - label: Form Fields
            name: attributeFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Attribute, name: attribute, widget: hidden}
              - {label: Content, name: value, widget: string}
  - name: divine_pages
    label: Divine Blueprint Pages
    label_singular: Divine Blueprint Page
    folder: content/page-settings/divine
    create: false
    extension: json
    format: json
    identifier_field: adminTitle
    description: "Edit the homepage, Start Here, all nine chapters, studies, teachings, podcast, companion, and ministry pages."
    fields:
      - {label: Page, name: adminTitle, widget: string}
      - {label: Website, name: target, widget: hidden}
      - {label: Page Path, name: pagePath, widget: hidden}
      - label: Search & Sharing
        name: seo
        widget: object
        collapsed: true
        fields:
          - {label: Browser & Search Title, name: title, widget: string}
          - {label: Search Description, name: description, widget: text, required: false}
      - label: Page Sections
        name: sections
        widget: list
        allow_add: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.label}}"
        fields:
          - {label: Section Name, name: label, widget: hidden}
          - label: Headings & Paragraphs
            name: textFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Formatting Mode, name: mode, widget: hidden}
              - {label: Content, name: value, widget: text, hint: "Edit the words here. Preserve any visible HTML tags in specially formatted headings."}
          - label: Links & Buttons
            name: linkFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Editable Text, name: textEditable, widget: hidden, default: true}
              - {label: Link Text, name: text, widget: string, required: false, condition: {field: textEditable, value: true}}
              - {label: Destination URL, name: url, widget: string}
          - label: Images
            name: imageFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Image, name: src, widget: image}
              - {label: Alternative Text, name: alt, widget: string, required: false}
          - label: Form Fields
            name: attributeFields
            widget: list
            required: false
            allow_add: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - {label: Field Name, name: label, widget: hidden}
              - {label: Page Selector, name: xpath, widget: hidden}
              - {label: Attribute, name: attribute, widget: hidden}
              - {label: Content, name: value, widget: string}
  - name: devotionals
    label: Devotionals
    label_singular: Devotional
    folder: content/devotionals
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "devotionals/{{slug}}"
    fields:
      - {label: Layout, name: layout, widget: hidden, default: layouts/post.njk}
      - {label: Title, name: title, widget: string}
      - {label: Description, name: description, widget: text}
      - {label: Publish Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: MMMM D, YYYY, time_format: false}
      - {label: Category, name: category, widget: select, options: [Guidance, Formation, Stewardship, Faith, Prayer, Identity, Purpose]}
      - {label: Key Scripture, name: keyScripture, widget: text, required: false}
      - {label: Collection Name, name: collectionName, widget: hidden, default: devotionals}
      - {label: Collection Label, name: collectionLabel, widget: hidden, default: Devotionals}
      - {label: Permalink, name: permalink, widget: string, hint: "/devotionals/your-slug/index.html"}
      - {label: Body, name: body, widget: markdown}
  - name: teachings
    label: Teachings
    folder: content/teachings
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: Layout, name: layout, widget: hidden, default: layouts/post.njk}
      - {label: Title, name: title, widget: string}
      - {label: Description, name: description, widget: text}
      - {label: Publish Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: MMMM D, YYYY, time_format: false}
      - {label: Format, name: format, widget: select, options: [Teaching Outline, Bible Study, Video Teaching, Podcast, Article]}
      - {label: Series, name: series, widget: string}
      - {label: Duration, name: duration, widget: string, required: false}
      - {label: Status, name: status, widget: select, options: [Outline available, Study available, Coming soon, Published]}
      - {label: Category, name: category, widget: string}
      - {label: Key Scripture, name: keyScripture, widget: text, required: false}
      - {label: Collection Name, name: collectionName, widget: hidden, default: teachings}
      - {label: Collection Label, name: collectionLabel, widget: hidden, default: Teachings}
      - {label: Permalink, name: permalink, widget: string, hint: "/teachings/your-slug/index.html"}
      - {label: Body, name: body, widget: markdown}
  - name: books
    label: Books
    folder: content/books
    create: true
    slug: "{{slug}}"
    fields:
      - {label: Layout, name: layout, widget: hidden, default: layouts/post.njk}
      - {label: Title, name: title, widget: string}
      - {label: Subtitle, name: subtitle, widget: string, required: false}
      - {label: Description, name: description, widget: text}
      - {label: Format, name: format, widget: string}
      - {label: Status, name: status, widget: select, options: [Available, Forthcoming, In development, Out of print]}
      - {label: Category, name: category, widget: string}
      - {label: Topics, name: topics, widget: list}
      - {label: Purchase URL, name: purchaseUrl, widget: string, required: false}
      - {label: Destination URL, name: destination, widget: string, required: false, hint: "Optional page used by book cards, such as /divine-blueprint/"}
      - {label: Collection Name, name: collectionName, widget: hidden, default: books}
      - {label: Collection Label, name: collectionLabel, widget: hidden, default: Books}
      - {label: Permalink, name: permalink, widget: string, hint: "/books/book-slug/index.html"}
      - {label: Body, name: body, widget: markdown}
  - name: resources
    label: Resources
    folder: content/resources
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: Layout, name: layout, widget: hidden, default: layouts/post.njk}
      - {label: Title, name: title, widget: string}
      - {label: Description, name: description, widget: text}
      - {label: Publish Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: MMMM D, YYYY, time_format: false}
      - {label: Type, name: type, widget: select, options: [Bible Study, Reflection Guide, Leader Guide, Worksheet, Devotional, Curriculum]}
      - {label: Audience, name: audience, widget: string}
      - {label: Status, name: status, widget: select, options: [Free download, Free online guide, Preview available, In development, Available for purchase]}
      - {label: Category, name: category, widget: string}
      - {label: Download URL, name: downloadUrl, widget: string, required: false}
      - {label: Collection Name, name: collectionName, widget: hidden, default: resources}
      - {label: Collection Label, name: collectionLabel, widget: hidden, default: Resources}
      - {label: Permalink, name: permalink, widget: string, hint: "/resources/resource-slug/index.html"}
      - {label: Body, name: body, widget: markdown}
  - name: settings
    label: Site Settings
    files:
      - label: General Settings
        name: site
        file: content/site.json
        format: json
        fields:
          - {label: Site Name, name: name, widget: string}
          - {label: Site URL, name: url, widget: string}
          - {label: Description, name: description, widget: text}
          - {label: Tagline, name: tagline, widget: string}
          - {label: Ministry Line, name: ministryLine, widget: text}
          - {label: Author, name: author, widget: string}
          - {label: Email, name: email, widget: string}
