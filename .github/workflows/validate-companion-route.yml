name: Validate Divine Blueprint routes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Validate Companion CTA and clean navigation
        shell: bash
        run: |
          set -euo pipefail
          ROOT="_site/divine-blueprint-site"
          PAGE="$ROOT/companion/index.html"

          test -s "$ROOT/companion.html"
          test -s "$PAGE"
          test -s "$ROOT/journey/index.html"
          test -s "$ROOT/bible-studies/index.html"
          test -s "$ROOT/teachings/index.html"
          test -s "$ROOT/assets/downloads/The-Divine-Blueprint-Companion-Fillable.pdf"
          test -s "$ROOT/assets/downloads/The-Divine-Blueprint-Companion-Print-Ready.pdf"

          grep -q '<base href="/">' "$PAGE"
          grep -q 'Get the Companion</a>' "$PAGE"
          grep -Eq 'href="#(companion-downloads|download-editions)"[^>]*>Get the Companion</a>' "$PAGE"
          grep -q 'Download Fillable PDF' "$PAGE"
          grep -Eq 'Download (Print-Ready PDF|Print Edition)' "$PAGE"

          grep -q 'href="/journey"' "$PAGE"
          grep -q 'href="/bible-studies"' "$PAGE"
          grep -q 'href="/teachings"' "$PAGE"
          grep -q 'href="/companion"' "$ROOT/index.html"

          if grep -R -E 'href=["'"']/?divine-blueprint-site/' "$ROOT" --include='*.html'; then
            echo "A public link still exposes the internal divine-blueprint-site folder." >&2
            exit 1
          fi

          if grep -Eq '<[^>]*data-modal-open[^>]*>[^<]*Get the Companion' "$PAGE"; then
            echo "Get the Companion is still connected to the store modal." >&2
            exit 1
          fi

          echo "Companion downloads and clean Journey, Bible Studies, and Teachings routes are present."
