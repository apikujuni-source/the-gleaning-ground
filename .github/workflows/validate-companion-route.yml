name: Validate Divine Blueprint routes and cover

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Validate routes, downloads, and canonical cover
        shell: bash
        run: |
          set -euo pipefail
          ROOT="_site/divine-blueprint-site"
          PAGE="$ROOT/companion/index.html"
          STYLES="$ROOT/assets/styles.css"

          test -s "$ROOT/companion.html"
          test -s "$PAGE"
          test -s "$ROOT/journey/index.html"
          test -s "$ROOT/bible-studies/index.html"
          test -s "$ROOT/teachings/index.html"
          test -s "$ROOT/assets/downloads/The-Divine-Blueprint-Companion-Fillable.pdf"
          test -s "$ROOT/assets/downloads/The-Divine-Blueprint-Companion-Print-Ready.pdf"
          test -s "$ROOT/assets/divine-blueprint-cover.webp"
          test -s "$ROOT/assets/canonical-book-cover.js"

          grep -q '<base href="/">' "$PAGE"
          grep -q 'class="[^"]*companion-page' "$PAGE"
          grep -q '/assets/canonical-book-cover.js' "$PAGE"
          grep -q 'Canonical Divine Blueprint book cover' "$STYLES"
          grep -q 'Companion full-cover display safeguard' "$STYLES"
          grep -q 'object-fit:contain!important' "$STYLES"

          # The old CSS-built journal mockup must be gone from the Companion hero.
          grep -q 'class="journal-visual companion-book-cover-visual"' "$PAGE"
          grep -q 'class="canonical-book-cover-image companion-page-book-cover"' "$PAGE"
          grep -q 'src="/assets/divine-blueprint-cover.webp"' "$PAGE"
          if grep -Eq 'class="[^"]*(open-journal|closed-journal|journal-lines)' "$PAGE"; then
            echo "The old cropped Companion journal mockup is still present." >&2
            exit 1
          fi

          grep -q 'Get the Companion</a>' "$PAGE"
          grep -Eq 'href="#(companion-downloads|download-editions)"[^>]*>Get the Companion</a>' "$PAGE"
          grep -q 'Download Fillable PDF' "$PAGE"
          grep -Eq 'Download (Print-Ready PDF|Print Edition)' "$PAGE"

          grep -q 'href="/journey"' "$PAGE"
          grep -q 'href="/bible-studies"' "$PAGE"
          grep -q 'href="/teachings"' "$PAGE"
          grep -q 'href="/companion"' "$ROOT/index.html"

          if grep -R -E 'href=["'"']/?divine-blueprint-site/' "$ROOT" --include='*.html'; then
            echo "A public link still exposes the internal divine-blueprint-site folder." >&2
            exit 1
          fi

          if grep -Eq '<[^>]*data-modal-open[^>]*>[^<]*Get the Companion' "$PAGE"; then
            echo "Get the Companion is still connected to the store modal." >&2
            exit 1
          fi

          node --input-type=module <<'NODE'
          import { readFile, readdir } from 'node:fs/promises';
          import { join } from 'node:path';
          const root = '_site/divine-blueprint-site';
          const canonical = '/assets/divine-blueprint-cover.webp';
          const failures = [];
          async function walk(dir) {
            for (const entry of await readdir(dir, { withFileTypes: true })) {
              const path = join(dir, entry.name);
              if (entry.isDirectory()) await walk(path);
              else if (entry.name.endsWith('.html')) {
                const html = await readFile(path, 'utf8');
                for (const tag of html.match(/<img\b[^>]*>/gi) || []) {
                  const src = tag.match(/\bsrc=(['"])(.*?)\1/i)?.[2] || '';
                  const identity = tag.toLowerCase();
                  const isBookCover = identity.includes('divine blueprint book cover') ||
                    identity.includes('hero-book-cover-image') ||
                    identity.includes('canonical-book-cover-image');
                  if (isBookCover && src !== canonical) failures.push(`${path}: ${src}`);
                }
              }
            }
          }
          await walk(root);
          if (failures.length) throw new Error(`Non-canonical book covers found:\n${failures.join('\n')}`);
          console.log('Every identified book-cover image uses the canonical Divine Blueprint cover.');
          NODE

          echo "Companion mockup was replaced by the complete cover; all book images are canonical; clean routes are present."
